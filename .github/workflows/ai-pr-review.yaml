name: AI PR Review

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Review PR with reusable AI reviewer
        if: github.event_name == 'pull_request'
        id: review
        uses: misospace/pr-reviewer-action@89f7c832108590cadda0e013d42ca1b8056a8e05 # v1.0.6
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          ai_base_url: 'https://api.minimax.io/v1'
          ai_model: 'MiniMax-M2.7'
          ai_api_key: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          ai_primary_retries: '4'
          ai_primary_retry_delay_sec: '10'
          standards_file: ""
          publish_review_comment: 'true'
