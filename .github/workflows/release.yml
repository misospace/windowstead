name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to build and publish assets for
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Load Godot toolchain config
        id: godot-config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG=$(cat godot-toolchain.json)
          echo "GODOT_VERSION=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_STATUS=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["linux"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["linux"]["sha256"])')" >> "$GITHUB_OUTPUT"

      - name: Download Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_LINUX_URL }}" -o /tmp/godot_linux.zip
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_LINUX_SHA256 }}" /tmp/godot_linux.zip | shasum -a 256 -c -
          unzip -oq /tmp/godot_linux.zip -d .tools/
          chmod +x .tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64

      - name: Run script tests
        shell: bash
        run: |
          set -euo pipefail
          ./.tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64 --headless --path . --script res://tests/test_runner.gd > tests.log 2>&1
          SCRIPT_EXIT=$?
          cat tests.log
          if [ $SCRIPT_EXIT -ne 0 ]; then
            echo "::error::Script tests failed — aborting release"
            exit 1
          fi

      - name: Run E2E gameplay flow tests
        shell: bash
        run: |
          set -euo pipefail
          ./.tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64 --headless --path . --script res://tests/test_e2e.gd > e2e-tests.log 2>&1
          E2E_EXIT=$?
          cat e2e-tests.log
          if [ $E2E_EXIT -ne 0 ]; then
            echo "::error::E2E tests failed — aborting release"
            exit 1
          fi

      - name: Run layout regression tests
        shell: bash
        run: |
          set -euo pipefail
          ./.tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64 --headless --path . --script res://tests/test_layout_math.gd > layout-tests.log 2>&1
          LAYOUT_EXIT=$?
          cat layout-tests.log
          if [ $LAYOUT_EXIT -ne 0 ]; then
            echo "::error::Layout regression tests failed — aborting release"
            exit 1
          fi

  linux:
    name: Linux export
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Load Godot toolchain config
        id: godot-config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG=$(cat godot-toolchain.json)
          echo "GODOT_VERSION=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_STATUS=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["linux"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["linux"]["sha256"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["templates"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["templates"]["sha256"])')" >> "$GITHUB_OUTPUT"

      - name: Verify Python
        shell: bash
        run: |
          set -euo pipefail
          python3 --version

      - name: Download Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_LINUX_URL }}" -o /tmp/godot_linux.zip
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_LINUX_SHA256 }}" /tmp/godot_linux.zip | shasum -a 256 -c -
          unzip -oq /tmp/godot_linux.zip -d .tools/
          chmod +x .tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64

      - name: Install export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.local/share/godot/export_templates/${{ steps.godot-config.outputs.GODOT_VERSION }}.${{ steps.godot-config.outputs.GODOT_STATUS }}
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_TEMPLATES_URL }}" -o /tmp/godot_export_templates.tpz
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_TEMPLATES_SHA256 }}" /tmp/godot_export_templates.tpz | shasum -a 256 -c -
          unzip -oq /tmp/godot_export_templates.tpz -d /tmp/godot_export_templates
          cp -f /tmp/godot_export_templates/templates/* ~/.local/share/godot/export_templates/${{ steps.godot-config.outputs.GODOT_VERSION }}.${{ steps.godot-config.outputs.GODOT_STATUS }}/

      - name: Export Linux build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release/linux
          .tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64 --headless --path . --export-release "Linux/X11" ./build/release/linux/windowstead.x86_64
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("build/windowstead-linux.zip")
          base = Path("build/release/linux")

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for relative in [Path("windowstead.x86_64"), Path("windowstead.pck")]:
                  zf.write(base / relative, relative.as_posix())
          PY

      - name: Upload release asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: build/windowstead-linux.zip
          fail_on_unmatched_files: true

  windows:
    name: Windows export
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Load Godot toolchain config
        id: godot-config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG=$(cat godot-toolchain.json)
          echo "GODOT_VERSION=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_STATUS=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["linux"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_LINUX_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["linux"]["sha256"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["templates"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["templates"]["sha256"])')" >> "$GITHUB_OUTPUT"

      - name: Verify Python
        shell: bash
        run: |
          set -euo pipefail
          python3 --version

      - name: Download Godot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_LINUX_URL }}" -o /tmp/godot_linux.zip
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_LINUX_SHA256 }}" /tmp/godot_linux.zip | shasum -a 256 -c -
          unzip -oq /tmp/godot_linux.zip -d .tools/
          chmod +x .tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64

      - name: Install export templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.local/share/godot/export_templates/${{ steps.godot-config.outputs.GODOT_VERSION }}.${{ steps.godot-config.outputs.GODOT_STATUS }}
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_TEMPLATES_URL }}" -o /tmp/godot_export_templates.tpz
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_TEMPLATES_SHA256 }}" /tmp/godot_export_templates.tpz | shasum -a 256 -c -
          unzip -oq /tmp/godot_export_templates.tpz -d /tmp/godot_export_templates
          cp -f /tmp/godot_export_templates/templates/* ~/.local/share/godot/export_templates/${{ steps.godot-config.outputs.GODOT_VERSION }}.${{ steps.godot-config.outputs.GODOT_STATUS }}/

      - name: Export Windows build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release/windows
          .tools/Godot_v${{ steps.godot-config.outputs.GODOT_VERSION }}-${{ steps.godot-config.outputs.GODOT_STATUS }}_linux.x86_64 --headless --path . --export-release "Windows Desktop" ./build/release/windows/windowstead.exe
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("build/windowstead-windows.zip")
          base = Path("build/release/windows")

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for relative in [Path("windowstead.exe"), Path("windowstead.pck")]:
                  zf.write(base / relative, relative.as_posix())
          PY

      - name: Upload release asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: build/windowstead-windows.zip
          fail_on_unmatched_files: true

  macos:
    name: macOS export
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Load Godot toolchain config
        id: godot-config
        shell: bash
        run: |
          set -euo pipefail
          CONFIG=$(cat godot-toolchain.json)
          echo "GODOT_VERSION=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_STATUS=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["status"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["templates"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_TEMPLATES_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["templates"]["sha256"])')" >> "$GITHUB_OUTPUT"
          echo "GODOT_MACOS_URL=$(echo "$CONFIG" | python3 -c 'import sys,json; cfg=json.load(sys.stdin); d=cfg["download_base"]; print(cfg["files"]["macos"]["url"].replace("${download_base}",d).replace("${version}",cfg["version"]).replace("${status}",cfg["status"]))')" >> "$GITHUB_OUTPUT"
          echo "GODOT_MACOS_SHA256=$(echo "$CONFIG" | python3 -c 'import sys,json; print(json.load(sys.stdin)["files"]["macos"]["sha256"])')" >> "$GITHUB_OUTPUT"

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          GODOT_TEMPLATES_DIR="$HOME/Library/Application Support/Godot/export_templates/${{ steps.godot-config.outputs.GODOT_VERSION }}.${{ steps.godot-config.outputs.GODOT_STATUS }}"
          mkdir -p "$GODOT_TEMPLATES_DIR"
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_TEMPLATES_URL }}" -o /tmp/godot_export_templates.tpz
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_TEMPLATES_SHA256 }}" /tmp/godot_export_templates.tpz | shasum -a 256 -c -
          unzip -oq /tmp/godot_export_templates.tpz -d /tmp/godot_export_templates
          cp -f /tmp/godot_export_templates/templates/* "$GODOT_TEMPLATES_DIR/"
          mkdir -p .tools/macos
          curl -fsSL "${{ steps.godot-config.outputs.GODOT_MACOS_URL }}" -o /tmp/godot_macos.zip
          printf '%s  %s\n' "${{ steps.godot-config.outputs.GODOT_MACOS_SHA256 }}" /tmp/godot_macos.zip | shasum -a 256 -c -
          unzip -oq /tmp/godot_macos.zip -d .tools/macos

      - name: Export macOS build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release/macos
          GODOT_MAC_APP=$(find .tools/macos -maxdepth 2 -name 'Godot.app' -print -quit)
          if [ -z "$GODOT_MAC_APP" ]; then
            echo 'Godot.app not found in downloaded macOS archive' >&2
            exit 1
          fi
          "$GODOT_MAC_APP/Contents/MacOS/Godot" --headless --path . --export-release "macOS" ./build/release/macos/windowstead.app
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          archive = Path("build/windowstead-macos.zip")
          base = Path("build/release/macos")

          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              pck_path = base / "windowstead.pck"
              if pck_path.is_file():
                  zf.write(pck_path, pck_path.relative_to(base).as_posix())

              app_root = base / "windowstead.app"
              for path in app_root.rglob("*"):
                  if path.is_file():
                      zf.write(path, path.relative_to(base).as_posix())
          PY

      - name: Upload release asset
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: build/windowstead-macos.zip
          fail_on_unmatched_files: true
